const TIER_NUMERALS=['I','II','III','IV','V'];

function badgeIconHtml(lvlIndex,color,cls='badge-icon'){
  if(lvlIndex<0) return `<div class="${cls} tier-none" style="--badge-color:#888"></div>`;
  const tierClass=`tier-${lvlIndex}`;
  const numeral=TIER_NUMERALS[lvlIndex];
  if(lvlIndex===4){
    return `<div class="${cls} ${tierClass}" style="--badge-color:${color}"><span>${numeral}</span></div>`;
  }
  return `<div class="${cls} ${tierClass}" style="--badge-color:${color}">${numeral}</div>`;
}

function bdlIconHtml(tierIndex,color,achieved){
  const numeral=TIER_NUMERALS[tierIndex];
  if(!achieved){
    if(tierIndex===4)
      return `<div class="bdl-icon tier-4 locked" style="--bdl-color:#888"><span>${numeral}</span></div>`;
    return `<div class="bdl-icon tier-${tierIndex} locked" style="--bdl-color:#888">${numeral}</div>`;
  }
  if(tierIndex===4)
    return `<div class="bdl-icon tier-4" style="--bdl-color:${color}"><span>${numeral}</span></div>`;
  return `<div class="bdl-icon tier-${tierIndex}" style="--bdl-color:${color}">${numeral}</div>`;
}

function renderBadgesScreen(){
  const body=document.getElementById('badges-body');
  if(!body)return;
  const ln=S.language==='de';
  let html='';
  BADGE_DEFS.forEach(def=>{
    const lvl=getBadgeLevelIndex(def);
    const bl=BADGE_LEVELS[lvl]||null;
    const next=BADGE_LEVELS[lvl+1]||null;
    const color=bl?bl.color:'#888';
    const cur=getBadgeCurrentValue(def);
    const bw=getBw();
    let progress=0,progressText='';
    if(lvl<4){
      const lo=lvl>=0?def.thresholds[lvl]:0;
      const hi=def.thresholds[lvl+1];
      const cv=def.type==='ratio'?(cur||0)/bw:(cur||0);
      progress=Math.min(100,Math.max(0,((cv-lo)/(hi-lo))*100));
      const curLabel=def.type==='ratio'?`${cur||0}kg`:`${cur||0}`;
      progressText=`${curLabel} / ${getBadgeThresholdLabel(def,lvl+1)}`;
    }
    html+=`<div class="badge-card" style="--badge-color:${color}" onclick="openBadgeDetail('${def.id}')">
      ${badgeIconHtml(lvl,color)}
      <div class="badge-name">${ln?def.nameDe:def.nameEn}</div>
      <div class="badge-level" style="color:${color}">${bl?bl.name:(ln?'Keine':'None')}</div>
      ${next?`<div class="badge-progress-bar"><div class="badge-progress-fill" style="width:${progress}%"></div></div>
      <div class="badge-progress-text">${progressText}</div>`:'<div class="badge-progress-text" style="color:var(--accent)">MAX</div>'}
    </div>`;
  });
  body.innerHTML=`<div class="badge-grid">${html}</div>`;
}

function renderPlanList(){

function openPlanSelector(){

// ═══════════════════════════════════════════════
function openPlan(planIdx){
  nav.planIdx=planIdx;
  const plan=S.plans[planIdx];
  plan.lastUsed=today();savePlans();
  const dk=Object.keys(plan.days||{}).map(Number).sort((a,b)=>a-b);
  if(!dk.length){plan.days={0:[]};savePlans();}
  nav.dayIdx=0;
  document.getElementById('plan-title').textContent=plan.name||'Plan';
  renderPlanScreen();
  showScreen('plan');
}

function renderPlanScreen(){
  const plan=S.plans[nav.planIdx];
  const dk=Object.keys(plan.days||{}).map(Number).sort((a,b)=>a-b);

  // Day tabs
  const tabs=document.getElementById('day-tabs');
  tabs.innerHTML='';
  dk.forEach(d=>{
    const btn=document.createElement('button');
    btn.className='day-tab'+(d===nav.dayIdx?' active':'');
    btn.textContent=getDayName(plan,d);
    btn.onclick=()=>{nav.dayIdx=d;renderPlanScreen();};
    tabs.appendChild(btn);
  });
  if(dk.length<7){
    const add=document.createElement('button');
    add.className='day-tab-add';
    add.innerHTML='<i class="ti ti-plus"></i>';
    add.onclick=()=>addDay();
    tabs.appendChild(add);
  }

  document.getElementById('day-active-label').textContent=getDayName(plan,nav.dayIdx).toUpperCase();

  const body=document.getElementById('plan-body');
  body.innerHTML='';
  const exercises=plan.days[nav.dayIdx]||[];

  exercises.forEach((ex,i)=>{
    const maxKg=getMaxKg(ex.entries);
    const isPR=maxKg!==null&&S.prs[ex.exerciseKey]===maxKg&&ex.exerciseKey;
    const name=getExName(ex.exerciseKey);
    const div=document.createElement('div');
    div.className='ex-row';
    div.innerHTML=`
      <div class="ex-num">${String(i+1).padStart(2,'0')}</div>
      <div class="ex-row-info">
        <div class="ex-row-name${name?'':' placeholder'}">${esc(name||t('exercise'))}</div>
        <div class="ex-row-meta">${ex.sets}×${ex.reps}</div>
      </div>
      <div class="ex-row-right">
        <div class="ex-row-kg">${maxKg!==null?maxKg+' kg':'—'}</div>
        ${isPR?'<div class="pr-badge">PR</div>':''}
      </div>
      <i class="ti ti-chevron-right" style="color:var(--accent);font-size:16px;flex-shrink:0"></i>
    `;
    div.addEventListener('click',()=>openExercise(nav.planIdx,nav.dayIdx,i));
    body.appendChild(div);
  });

  const addBtn=document.createElement('button');
  addBtn.className='add-dashed';
  addBtn.innerHTML=`<i class="ti ti-plus"></i> ${t('addExercise')}`;
  addBtn.onclick=()=>addExercise();
  body.appendChild(addBtn);
}

function addDay(){
  const plan=S.plans[nav.planIdx];
  const dk=Object.keys(plan.days||{}).map(Number);
  const nk=dk.length?Math.max(...dk)+1:0;
  if(nk>=7){showToast('Max 7 days');return;}
  plan.days[nk]=[];nav.dayIdx=nk;
  savePlans();renderPlanScreen();
}

function addExercise(){
  const exs=S.plans[nav.planIdx].days[nav.dayIdx];
  if(exs.length>=15){showToast('Max 15 exercises');return;}
  exs.push({exerciseKey:'',sets:3,reps:10,entries:[]});
  savePlans();
  openExercise(nav.planIdx,nav.dayIdx,exs.length-1);
}

function toggleExSelector(open){
  const collapsed=document.getElementById('ex-selector-collapsed');
  const openEl=document.getElementById('ex-selector-open');
  if(!collapsed||!openEl)return;
  if(open){collapsed.classList.add('hidden');openEl.classList.remove('hidden');document.getElementById('ex-search')?.focus();}
  else{collapsed.classList.remove('hidden');openEl.classList.add('hidden');}
}

function populateExList(query){
  const c=document.getElementById('ex-list');
  if(!c)return;
  const q=query.toLowerCase();
  const ex=S.plans[nav.planIdx].days[nav.dayIdx][nav.exIdx];
  const filtered=EXERCISES.filter(e=>
    e.nameEn.toLowerCase().includes(q)||
    e.nameDe.toLowerCase().includes(q)||
    e.muscle.toLowerCase().includes(q)
  );
  if(!filtered.length){c.innerHTML=`<div style="padding:12px;color:var(--text-secondary);font-size:12px">No results</div>`;return;}
  c.innerHTML=filtered.map(e=>{
    const name=S.language==='de'?e.nameDe:e.nameEn;
    const sel=e.nameEn===ex.exerciseKey;
    return`<div class="ex-list-item${sel?' selected':''}" data-key="${esc(e.nameEn)}">
      <div class="ex-list-name">${esc(name)}</div>
      <div class="ex-list-muscle">${e.muscle} · ${e.category}</div>
    </div>`;
  }).join('');
  c.querySelectorAll('.ex-list-item').forEach(item=>{
    item.addEventListener('click',()=>selectExercise(item.dataset.key));
  });
}

function selectExercise(key){
  const exObj=S.plans[nav.planIdx].days[nav.dayIdx][nav.exIdx];
  exObj.exerciseKey=key;savePlans();
  const name=getExName(key);
  document.getElementById('ex-title').textContent=name;
  const gt=document.getElementById('graph-title');
  if(gt) gt.textContent=`${esc(name)} — ${t('maxWeight')}`;
  // Update collapsed label and collapse
  const nameEl=document.getElementById('ex-selector-name');
  if(nameEl) nameEl.textContent=name;
  toggleExSelector(false);
  populateExList('');
}

function saveSession(){
  const ln=S.language==='de';
  const dateVal=document.getElementById('det-date').value;
  if(!dateVal){showToast(ln?'Datum eingeben':'Enter a date');return;}
  const ex=S.plans[nav.planIdx].days[nav.dayIdx][nav.exIdx];
  // Collect sets
  const kgInputs=[...document.querySelectorAll('.set-kg-input')];
  const repsInputs=[...document.querySelectorAll('.set-reps-input')];
  const sets=[];
  kgInputs.forEach((inp,i)=>{
    const kg=parseFloat(inp.value);
    const reps=parseInt(repsInputs[i]?.value)||null;
    if(kg&&!isNaN(kg)&&kg>0) sets.push({kg:Math.round(kg*10)/10,reps});
  });
  if(!sets.length){showToast(ln?'Mindestens 1 Satz eingeben':'Enter at least 1 set');return;}
  if(!ex.entries) ex.entries=[];
  const sessionMaxKg=Math.max(...sets.map(s=>s.kg));
  const globalPR=S.prs[ex.exerciseKey]||0;
  const isNewPR=ex.exerciseKey&&sessionMaxKg>globalPR;
  ex.entries.push({sets,date:dateVal});
  if(isNewPR){S.prs[ex.exerciseKey]=sessionMaxKg;savePrs();}
  markTrainingToday();
  // Log XP per set (capped in logSetXp)
  sets.forEach(()=>logSetXp());
  const ln2=S.language==='de';
  showToast(isNewPR
    ?`<i class="ti ti-medal" style="vertical-align:-2px"></i> ${t('newPR')}`
    :`<i class="ti ti-check" style="vertical-align:-2px"></i> ${t('saved')}`);
  // Clear inputs
  document.querySelectorAll('.set-kg-input,.set-reps-input').forEach(el=>el.value='');
  savePlans();
  const total=ex.entries.length;
  updateZoomSlider('ex-zoom-row','ex-zoom','ex-zoom-val',total);
  renderExEntryList();
  setTimeout(()=>drawChart('ex-chart',ex.entries,total),50);
}

function renderExEntryList(){
  const c=document.getElementById('ex-entry-list');
  if(!c)return;
  const ex=S.plans[nav.planIdx]?.days[nav.dayIdx]?.[nav.exIdx];
  if(!ex){c.innerHTML='';return;}
  const ln=S.language==='de';
  const sorted=(ex.entries||[]).slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!sorted.length){
    c.innerHTML=`<div style="color:var(--text-secondary);font-size:12px;padding:6px 0">${t('noEntries')}</div>`;return;
  }
  c.innerHTML=sorted.slice(0,12).map(e=>{
    const oi=ex.entries.indexOf(e);
    const sets=getSessionSets(e);
    const maxKg=getSessionMaxKg(e);
    const setsLabel=sets.map((s,i)=>`${ln?'S':'S'}${i+1}: ${s.kg}kg${s.reps?' ×'+s.reps:''}`).join(' &nbsp;·&nbsp; ');
    return`<div class="entry-item" style="flex-direction:column;align-items:stretch;gap:3px;padding:8px 0">
      <div style="display:flex;align-items:center">
        <span class="entry-date">${fmtDate(e.date)}</span>
        <span class="entry-kg" style="margin-left:auto">${maxKg} kg</span>
        <button class="entry-del" data-oi="${oi}" aria-label="Delete"><i class="ti ti-x" style="font-size:12px"></i></button>
      </div>
      <div style="font-size:10px;color:var(--text-secondary);padding-left:2px">${setsLabel}</div>
    </div>`;
  }).join('');
  c.querySelectorAll('.entry-del').forEach(btn=>{
    btn.addEventListener('click',()=>deleteExEntry(parseInt(btn.dataset.oi)));
  });
}

function deleteExEntry(oi){
  const ex=S.plans[nav.planIdx].days[nav.dayIdx][nav.exIdx];
  const removed=ex.entries[oi];
  if(!removed)return;
  const removedMax=getSessionMaxKg(removed);
  const removedSets=getSessionSets(removed);
  const wasGlobalPR=ex.exerciseKey&&S.prs[ex.exerciseKey]===removedMax;
  // Subtract from setsLog
  if(!S.xp.setsLog) S.xp.setsLog={};
  const d=removed.date;
  if(S.xp.setsLog[d]) S.xp.setsLog[d]=Math.max(0,(S.xp.setsLog[d]||0)-removedSets.length);
  ex.entries.splice(oi,1);
  if(wasGlobalPR){
    const newMax=getMaxKg(ex.entries);
    if(newMax!==null) S.prs[ex.exerciseKey]=newMax;
    else delete S.prs[ex.exerciseKey];
    savePrs();
  }
  savePlans();saveXp();
  showToast(`<i class="ti ti-trash" style="vertical-align:-2px"></i> ${t('deleted')}`);
  const total=ex.entries.length;
  updateZoomSlider('ex-zoom-row','ex-zoom','ex-zoom-val',total);
  renderExEntryList();
  renderScoreCard();
  if(total>0) drawChart('ex-chart',ex.entries,total);
  else if(charts['ex-chart']){charts['ex-chart'].destroy();delete charts['ex-chart'];}
}

function updateZoomSlider(rowId,sliderId,valId,total){
  const row=document.getElementById(rowId);
  const slider=document.getElementById(sliderId);
  const valEl=document.getElementById(valId);
  if(!row||!slider)return;
  row.style.display=total>1?'flex':'none';
  slider.max=Math.max(total,2);slider.value=total;
  if(valEl)valEl.textContent=total;
}

// Themed in-app dialogs (replace iframe-blocked prompt/confirm)
function askInput({title,value='',placeholder='',okLabel='OK'}){
  return new Promise(resolve=>{
    const pop=document.getElementById('input-popup');
    const field=document.getElementById('input-popup-field');
    const ok=document.getElementById('input-popup-ok');
    const cancel=document.getElementById('input-popup-cancel');
    document.getElementById('input-popup-title').textContent=title;
    field.style.display='';
    field.placeholder=placeholder;field.value=value;
    ok.textContent=okLabel;
    cancel.textContent=(S.language==='de'?'Abbrechen':'Cancel');
    function close(val){
      pop.classList.remove('open');
      ok.onclick=cancel.onclick=field.onkeydown=pop.onclick=null;
      resolve(val);
    }
    ok.onclick=()=>close(field.value);
    cancel.onclick=()=>close(null);
    field.onkeydown=e=>{if(e.key==='Enter')close(field.value);if(e.key==='Escape')close(null);};
    pop.onclick=e=>{if(e.target===pop)close(null);};
    pop.classList.add('open');
    setTimeout(()=>field.focus(),50);
  });
}
function askConfirm({title,okLabel}){
  return new Promise(resolve=>{
    const pop=document.getElementById('input-popup');
    const field=document.getElementById('input-popup-field');
    const ok=document.getElementById('input-popup-ok');
    const cancel=document.getElementById('input-popup-cancel');
    document.getElementById('input-popup-title').textContent=title;
    field.style.display='none';
    ok.textContent=okLabel||(S.language==='de'?'Löschen':'Delete');
    cancel.textContent=(S.language==='de'?'Abbrechen':'Cancel');
    function close(val){
      pop.classList.remove('open');
      field.style.display='';
      ok.onclick=cancel.onclick=pop.onclick=null;
      resolve(val);
    }
    ok.onclick=()=>close(true);
    cancel.onclick=()=>close(false);
    pop.onclick=e=>{if(e.target===pop)close(false);};
    pop.classList.add('open');
  });
}

function createPlan(){
  askInput({title:(S.language==='de'?'Neuer Plan':'New Plan'),value:'',placeholder:(S.language==='de'?'Plan-Name':'Plan name'),okLabel:(S.language==='de'?'Erstellen':'Create')}).then(name=>{
    if(name===null)return;
    S.plans.push({name:name.trim()||'New Plan',days:{0:[]},dayNames:{},lastUsed:null});
    S.activePlanIdx=S.plans.length-1;
    savePlans();saveActivePlan();renderPlanList();
    openPlan(S.activePlanIdx);
  });
}

function getDayName(plan,dk){
  return(plan.dayNames&&plan.dayNames[dk])||`Day ${dk+1}`;
}

    const exCount=(plan.days[d]||[]).length;
    row.innerHTML=`
      <input class="dm-day-input" data-dk="${d}" value="${esc(getDayName(plan,d))}" placeholder="Day ${d+1}">
      <span style="font-size:10px;color:var(--text-secondary);flex-shrink:0">${exCount} ex</span>
      <button class="dm-del-btn" data-dk="${d}" title="Delete day">×</button>
    `;
    c.appendChild(row);
  });
  // Save name on blur
  c.querySelectorAll('.dm-day-input').forEach(inp=>{
    inp.addEventListener('blur',()=>{
      const d=parseInt(inp.dataset.dk);
      if(!plan.dayNames) plan.dayNames={};
      plan.dayNames[d]=inp.value.trim()||`Day ${d+1}`;
      savePlans();
      renderPlanScreen();
    });
  });
  // Delete day
  c.querySelectorAll('.dm-del-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const d=parseInt(btn.dataset.dk);
      askConfirm({title:`${getDayName(plan,d)} — ${S.language==='de'?'löschen?':'delete this day and all its exercises?'}`}).then(yes=>{
        if(!yes)return;
        delete plan.days[d];
        if(plan.dayNames) delete plan.dayNames[d];
        savePlans();
        // If deleted current day, switch to first remaining
        const remaining=Object.keys(plan.days).map(Number).sort((a,b)=>a-b);
        if(!remaining.includes(nav.dayIdx)) nav.dayIdx=remaining[0]??0;
        renderDayManagerList();
        renderPlanScreen();
      });
    });
  });
}

// PROFILE

function renderProfileScreen(){
  const body=document.getElementById('profile-body');
  const p=S.profile;
  body.innerHTML='';

  const info=document.createElement('div');
  info.className='profile-section';
  info.innerHTML=`
    <div class="profile-section-title">PROFILE</div>
    <div style="margin-bottom:10px">
      <label class="field-label">${t('name')}</label>
      <input type="text" id="p-name" value="${esc(p.name||'')}" placeholder="Your name">
    </div>
    <div class="form-row">
      <div class="form-field">
        <label class="field-label">${t('age')}</label>
        <input type="number" id="p-age" value="${p.age||''}" placeholder="25" min="1" max="120">
      </div>
      <div class="form-field">
        <label class="field-label">${t('height')}</label>
        <input type="number" id="p-height" value="${p.height||''}" placeholder="180" min="50" max="250">
      </div>
    </div>
    <button class="btn-primary" id="p-save" style="width:100%;margin-top:4px">${t('save')}</button>
  `;

  // ── Avatar upload ────────────────────────────
  const ln2=S.language==='de';
  const avatarSec=document.createElement('div');
  avatarSec.className='profile-section';
  avatarSec.innerHTML=`
    <div class="profile-section-title">${ln2?'PROFILBILD':'PROFILE PHOTO'}</div>
    ${S.profile.avatar?`<img src="${S.profile.avatar}" class="avatar-preview" id="avatar-preview-img">`:'<div id="avatar-preview-img" style="display:none"></div>'}
    <button class="avatar-upload-btn" id="avatar-upload-btn">
      <i class="ti ti-camera" style="font-size:18px;color:var(--accent)"></i>
      ${ln2?'Foto hochladen (max. 200 KB)':'Upload photo (max. 200 KB)'}
    </button>
    <input type="file" id="avatar-file-input" accept="image/*" style="display:none">
    ${S.profile.avatar?`<button class="btn-secondary" id="avatar-remove-btn" style="width:100%;margin-top:0;font-size:12px">${ln2?'Bild entfernen':'Remove photo'}</button>`:''}
  `;
  body.appendChild(avatarSec);

  document.getElementById('avatar-upload-btn').addEventListener('click',()=>{
    document.getElementById('avatar-file-input').click();
  });
  document.getElementById('avatar-file-input').addEventListener('change',function(){
    const file=this.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const MAX=200;
        let w=img.width,h=img.height;
        if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        // Compress until under 200KB
        let quality=0.8;
        let dataUrl=canvas.toDataURL('image/jpeg',quality);
        while(dataUrl.length>200*1024*1.37&&quality>0.2){
          quality-=0.1;
          dataUrl=canvas.toDataURL('image/jpeg',quality);
        }
        if(dataUrl.length>200*1024*1.37){showToast(ln2?'Bild zu groß':'Image too large');return;}
        S.profile.avatar=dataUrl;
        saveProfile();
        renderProfileScreen();
        showToast(ln2?'Bild gespeichert':'Photo saved');
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('avatar-remove-btn')?.addEventListener('click',()=>{
    S.profile.avatar='';saveProfile();renderProfileScreen();
  });

  const bwTotal=S.bodyweight.length;
  const bwSec=document.createElement('div');
  bwSec.className='profile-section';
  bwSec.innerHTML=`
    <div class="profile-section-title">${t('bodyweight')}</div>
    <div class="form-row" style="margin-bottom:12px">
      <div class="form-field">
        <label class="field-label">${t('weight')}</label>
        <input type="number" id="bw-kg" min="0" step="0.1" placeholder="80" inputmode="decimal">
      </div>
      <div class="form-field">
        <label class="field-label">${t('date')}</label>
        <input type="date" id="bw-date" value="${today()}">
      </div>
      <button class="btn-primary" id="bw-save">+</button>
    </div>
    <div class="chart-wrap" style="margin-bottom:10px"><canvas id="bw-chart"></canvas></div>
    <div class="zoom-row" id="bw-zoom-row" style="display:${bwTotal>1?'flex':'none'};margin-bottom:10px">
      <span class="zoom-label">${t('zoom')}</span>
      <input type="range" id="bw-zoom" min="2" max="${Math.max(bwTotal,2)}" value="${bwTotal}" step="1">
      <span class="zoom-val" id="bw-zoom-val">${bwTotal}</span>
    </div>
    <div class="entry-list">
      <div class="entry-list-label">${t('entries')}</div>
      <div id="bw-entry-list"></div>
    </div>
  `;

  body.appendChild(info);
  body.appendChild(bwSec);

  document.getElementById('p-save').addEventListener('click',()=>{
    S.profile.name=document.getElementById('p-name').value.trim()||'User';
    S.profile.age=document.getElementById('p-age').value;
    S.profile.height=document.getElementById('p-height').value;
    saveProfile();renderGreeting();showToast(t('saved'));
  });

  document.getElementById('bw-save').addEventListener('click',()=>{
    const kg=parseFloat(document.getElementById('bw-kg').value);
    const date=document.getElementById('bw-date').value;
    if(!kg||isNaN(kg)||kg<=0){showToast('Enter a valid weight');return;}
    S.bodyweight.push({kg:Math.round(kg*10)/10,date});
    document.getElementById('bw-kg').value='';
    saveBw();renderBwList();
    const tot=S.bodyweight.length;
    updateZoomSlider('bw-zoom-row','bw-zoom','bw-zoom-val',tot);
    if(tot>0) drawBwChart(tot);
    showToast(t('saved'));
  });

  document.getElementById('bw-zoom')?.addEventListener('input',function(){
    document.getElementById('bw-zoom-val').textContent=this.value;
    drawBwChart(parseInt(this.value));
  });

  renderBwList();
  if(bwTotal>0) setTimeout(()=>drawBwChart(bwTotal),80);

  // ── Showcase Picker (badges) ──────────────────
  const ln=S.language==='de';
  const bscSec=document.createElement('div');
  bscSec.className='profile-section';
  let bscHtml=`<div class="profile-section-title">${ln?'BADGES ANZEIGEN':'FEATURED BADGES'}</div>
    <div style="font-size:11px;color:var(--text-secondary);margin-bottom:10px">${ln?'Bis zu 3 Badges':'Up to 3 badges'}</div>`;
  BADGE_DEFS.forEach(def=>{
    const lvl=getBadgeLevelIndex(def);
    const bl=BADGE_LEVELS[lvl]||null;
    const checked=(S.profile.badgeShowcase||[]).includes(def.id);
    bscHtml+=`<label class="showcase-item">
      <input type="checkbox" data-badge="${def.id}" ${checked?'checked':''}>
      ${badgeIconHtml(lvl,bl?bl.color:'#888','badge-icon badge-icon-sm')}
      <span class="showcase-item-label">${ln?def.nameDe:def.nameEn} <span style="color:var(--text-secondary);font-weight:600">${bl?bl.name:(ln?'Keine':'None')}</span></span>
    </label>`;
  });
  bscHtml+=`<button class="btn-primary" id="bsc-save" style="width:100%;margin-top:8px">${t('save')}</button>`;
  bscSec.innerHTML=bscHtml;
  body.appendChild(bscSec);

  document.getElementById('bsc-save').addEventListener('click',()=>{
    const checked=[...bscSec.querySelectorAll('input[type=checkbox]:checked')].map(el=>el.dataset.badge);
    if(checked.length>3){showToast(ln?'Max. 3 Badges':'Max 3 badges');return;}
    S.profile.badgeShowcase=checked;saveProfile();showToast(t('saved'));
  });

  // ── Showcase Picker (PRs) ───────────────────
  const pscSec=document.createElement('div');
  pscSec.className='profile-section';
  const prKeys=[...new Set(S.plans.flatMap(p=>Object.values(p.days||{}).flat().map(e=>e.exerciseKey).filter(Boolean)))];
  let pscHtml=`<div class="profile-section-title">${ln?'BESTLEISTUNGEN ANZEIGEN':'FEATURED PRs'}</div>
    <div style="font-size:11px;color:var(--text-secondary);margin-bottom:10px">${ln?'Bis zu 3 Übungen':'Up to 3 exercises'}</div>`;
  prKeys.forEach(key=>{
    const checked=(S.profile.prShowcase||[]).includes(key);
    const pr=getGlobalMaxKg(key);
    pscHtml+=`<label class="showcase-item">
      <input type="checkbox" data-pr="${esc(key)}" ${checked?'checked':''}>
      <span>${key}${pr?' — '+pr+' kg':''}</span>
    </label>`;
  });
  pscHtml+=`<button class="btn-primary" id="psc-save" style="width:100%;margin-top:8px">${t('save')}</button>`;
  pscSec.innerHTML=pscHtml;
  body.appendChild(pscSec);

  document.getElementById('psc-save').addEventListener('click',()=>{
    const checked=[...pscSec.querySelectorAll('input[type=checkbox]:checked')].map(el=>el.dataset.pr);
    if(checked.length>3){showToast(ln?'Max. 3 Übungen':'Max 3 exercises');return;}
    S.profile.prShowcase=checked;saveProfile();showToast(t('saved'));
  });
}

function drawBwChart(n){
  drawChart('bw-chart',S.bodyweight.map(e=>({kg:e.kg,date:e.date})),n||S.bodyweight.length);
}

function renderBwList(){
  const c=document.getElementById('bw-entry-list');
  if(!c)return;
  const sorted=[...S.bodyweight].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!sorted.length){c.innerHTML=`<div style="color:var(--text-secondary);font-size:12px;padding:6px 0">${t('noEntries')}</div>`;return;}
  c.innerHTML=sorted.slice(0,10).map(e=>{
    const oi=S.bodyweight.findIndex(x=>x.date===e.date&&x.kg===e.kg);
    return`<div class="entry-item">
      <span class="entry-date">${fmtDate(e.date)}</span>
      <span class="entry-kg">${e.kg} kg</span>
      <button class="entry-del" data-oi="${oi}">×</button>
    </div>`;
  }).join('');
  c.querySelectorAll('.entry-del').forEach(btn=>{
    btn.addEventListener('click',()=>{
      S.bodyweight.splice(parseInt(btn.dataset.oi),1);
      saveBw();renderBwList();
      const tot=S.bodyweight.length;
      updateZoomSlider('bw-zoom-row','bw-zoom','bw-zoom-val',tot);
      if(tot>0) drawBwChart(tot);
      else if(charts['bw-chart']){charts['bw-chart'].destroy();delete charts['bw-chart'];}
      showToast(t('deleted'));
    });
  });
}

      +`<div class="theme-label" style="font-family:'Shippori Mincho',serif;font-size:12px;margin-top:7px;font-weight:${sel?'700':'500'};color:${sel?'var(--accent)':'var(--text-secondary)'}">${g.label.split(' (')[0]}</div>`;
    tile.addEventListener('click',()=>{

    <div class="profile-section-title">ACCOUNT</div>

  });
  document.getElementById('lang-de').addEventListener('click',()=>{

  document.getElementById('ex-del-btn').addEventListener('click',()=>{
    if(confirm(t('deleteExercise'))){
      S.plans[nav.planIdx].days[nav.dayIdx].splice(nav.exIdx,1);
      savePlans();showScreen('plan');renderPlanScreen();
    }
  });

  // Profile overview popup
  document.getElementById('profile-overview-btn')?.addEventListener('click',renderProfileOverlay);
  document.getElementById('tg-profile-btn')?.addEventListener('click',renderProfileOverlay);
  document.getElementById('profile-overview-popup')?.addEventListener('click',e=>{
    if(e.target.id==='profile-overview-popup') document.getElementById('profile-overview-popup').classList.remove('open');
  });

  // Badge detail popup close
  document.getElementById('badge-detail-popup')?.addEventListener('click',e=>{
    if(e.target.id==='badge-detail-popup') document.getElementById('badge-detail-popup').classList.remove('open');
  });

  // Badges back
  document.getElementById('badges-back-btn')?.addEventListener('click',()=>{showTab('settings');renderSettingsScreen();});

  // Timer
  document.getElementById('plan-timer-btn')?.addEventListener('click',()=>{
    const b=document.getElementById('timer-banner');
    b.classList.toggle('active');
  });
  document.getElementById('timer-start-btn')?.addEventListener('click',timerStart);
  document.getElementById('timer-reset-btn')?.addEventListener('click',timerReset);
  document.querySelectorAll('.timer-preset').forEach(btn=>{
    btn.addEventListener('click',()=>timerSetPreset(parseInt(btn.dataset.sec)));
  });

  // Sub-screen back buttons → return to Settings tab
  ['friends','profile','design'].forEach(s=>{
    document.getElementById(s+'-back-btn')?.addEventListener('click',()=>{showTab('settings');renderSettingsScreen();});
  });

  // Day manager sheet
  document.getElementById('dm-plan-save').addEventListener('click',()=>{
    const val=document.getElementById('dm-plan-input').value.trim();
    if(!val)return;
    S.plans[nav.planIdx].name=val;savePlans();
    document.getElementById('plan-title').textContent=val;
    document.getElementById('dm-plan-name').textContent=val;
    renderPlanList();showToast(t('saved'));
  });
  document.getElementById('dm-close').addEventListener('click',()=>document.getElementById('day-manager-popup').classList.remove('open'));
  document.getElementById('day-manager-popup').addEventListener('click',e=>{
    if(e.target.id==='day-manager-popup') document.getElementById('day-manager-popup').classList.remove('open');
  });
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init(){
  loadState();
  loadGames();
  checkStreakOnOpen();
  applyGradient(S.theme);
  applyDarkMode(S.darkMode);
  renderGreeting();
  updateHomeXp();
  renderPlanList();
  renderScoreCard();
  updateI18n();
  initEvents();
  initBball();
}

init();
</script>
